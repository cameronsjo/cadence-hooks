name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build release binary
        env:
          USE_CROSS: ${{ matrix.use-cross }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ "${USE_CROSS}" = "true" ]; then
            cross build --release --target "${TARGET}"
          else
            cargo build --release --target "${TARGET}"
          fi

      - name: Create tarball
        env:
          TARGET: ${{ matrix.target }}
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="cadence-hooks-${VERSION}-${MATRIX_NAME}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${TARGET}/release" cadence-hooks
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum cadence-hooks-*.tar.gz > checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: cadence-hooks-*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cadence-hooks-*.tar.gz
            checksums.txt

      - name: Clean up beta prereleases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release list --limit 50 | grep "${VERSION}-beta" | awk '{print $1}' | while read -r tag; do
            gh release delete "$tag" --yes --cleanup-tag || true
          done

      - name: Parse checksums for Homebrew
        id: shas
        run: |
          for platform in macos-x86_64 macos-aarch64 linux-x86_64 linux-aarch64; do
            SHA=$(grep "${platform}" checksums.txt | awk '{print $1}')
            KEY=$(echo "$platform" | tr '-' '_')
            echo "sha_${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - name: Generate Forge Bellows token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ github.ref_name }}
          SHA_MACOS_X86_64: ${{ steps.shas.outputs.sha_macos_x86_64 }}
          SHA_MACOS_AARCH64: ${{ steps.shas.outputs.sha_macos_aarch64 }}
          SHA_LINUX_X86_64: ${{ steps.shas.outputs.sha_linux_x86_64 }}
          SHA_LINUX_AARCH64: ${{ steps.shas.outputs.sha_linux_aarch64 }}
        run: |
          gh api repos/cameronsjo/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[formula]=cadence-hooks" \
            -f "client_payload[version]=${VERSION#v}" \
            -f "client_payload[sha_macos_x86_64]=${SHA_MACOS_X86_64}" \
            -f "client_payload[sha_macos_aarch64]=${SHA_MACOS_AARCH64}" \
            -f "client_payload[sha_linux_x86_64]=${SHA_LINUX_X86_64}" \
            -f "client_payload[sha_linux_aarch64]=${SHA_LINUX_AARCH64}"
