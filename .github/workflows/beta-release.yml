name: Beta Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Determine beta version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          LAST_BETA=$(git tag -l "v${BASE_VERSION}-beta.*" --sort=-v:refname | head -1)
          if [ -n "$LAST_BETA" ]; then
            LAST_NUM=$(echo "$LAST_BETA" | sed 's/.*-beta\.\([0-9]*\).*/\1/')
            NEXT_NUM=$((LAST_NUM + 1))
          else
            NEXT_NUM=1
          fi
          echo "version=${BASE_VERSION}-beta.${NEXT_NUM}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build release binary
        env:
          USE_CROSS: ${{ matrix.use-cross }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ "${USE_CROSS}" = "true" ]; then
            cross build --release --target "${TARGET}"
          else
            cargo build --release --target "${TARGET}"
          fi

      - name: Create tarball
        env:
          TARGET: ${{ matrix.target }}
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          VERSION="v${{ needs.check.outputs.version }}"
          ARCHIVE="cadence-hooks-${VERSION}-${MATRIX_NAME}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${TARGET}/release" cadence-hooks
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Beta Release
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum cadence-hooks-*.tar.gz > checksums.txt

      - name: Create GitHub Prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.check.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Beta $VERSION" \
            --notes "**Beta release for testing.** Install with: \`brew install cameronsjo/tap/cadence-hooks-beta\`" \
            --prerelease \
            cadence-hooks-*.tar.gz checksums.txt

      - name: Parse checksums for Homebrew
        id: shas
        run: |
          for platform in macos-x86_64 macos-aarch64 linux-x86_64 linux-aarch64; do
            SHA=$(grep "${platform}" checksums.txt | awk '{print $1}')
            KEY=$(echo "$platform" | tr '-' '_')
            echo "sha_${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - name: Generate Forge Bellows token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Update Homebrew beta tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.check.outputs.version }}
          SHA_MACOS_X86_64: ${{ steps.shas.outputs.sha_macos_x86_64 }}
          SHA_MACOS_AARCH64: ${{ steps.shas.outputs.sha_macos_aarch64 }}
          SHA_LINUX_X86_64: ${{ steps.shas.outputs.sha_linux_x86_64 }}
          SHA_LINUX_AARCH64: ${{ steps.shas.outputs.sha_linux_aarch64 }}
        run: |
          gh api repos/cameronsjo/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[formula]=cadence-hooks-beta" \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[sha_macos_x86_64]=${SHA_MACOS_X86_64}" \
            -f "client_payload[sha_macos_aarch64]=${SHA_MACOS_AARCH64}" \
            -f "client_payload[sha_linux_x86_64]=${SHA_LINUX_X86_64}" \
            -f "client_payload[sha_linux_aarch64]=${SHA_LINUX_AARCH64}"
